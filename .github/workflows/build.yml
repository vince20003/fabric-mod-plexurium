name: Build Fabric Mod
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build with Gradle
        run: gradle build

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: Plexurium-mod
          path: build/libs/*.jar
          retention-days: 30
